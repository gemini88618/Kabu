<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Stocks">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icon.png">
    <link rel="icon" type="image/png" href="/icon.png">
    <title>Stock Scanner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: #f5f5f5;
            overflow: hidden;
        }

        :root {
            --safe-top: max(12px, env(safe-area-inset-top));
            --safe-bottom: max(12px, env(safe-area-inset-bottom));
            --safe-left: max(12px, env(safe-area-inset-left));
            --safe-right: max(12px, env(safe-area-inset-right));
            --primary-color: #000000;
            --success-color: #4CAF50;
            --danger-color: #f44336;
            --text-color: #333;
            --border-color: #ddd;
        }

        body {
            display: flex;
            flex-direction: column;
            padding-top: var(--safe-top);
            padding-bottom: var(--safe-bottom);
            padding-left: var(--safe-left);
            padding-right: var(--safe-right);
        }

        .header {
            padding: 16px 16px;
            background: white;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-title {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-color);
            flex: 1;
        }

        .header-icon {
            width: 32px;
            height: 32px;
            background: url('/icon.png') center / contain;
        }

        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .controls {
            background: white;
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .control-row {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .control-label {
            font-size: 12px;
            font-weight: 600;
            color: #999;
            text-transform: uppercase;
            min-width: 60px;
        }

        .button-group {
            display: flex;
            gap: 8px;
            flex: 1;
        }

        button {
            flex: 1;
            padding: 10px 12px;
            border: 2px solid var(--border-color);
            background: white;
            color: var(--text-color);
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            min-height: 44px;
            touch-action: manipulation;
            -webkit-user-select: none;
            user-select: none;
        }

        button:active {
            transform: scale(0.95);
            background: #f9f9f9;
        }

        button.active {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .slider-container {
            display: flex;
            gap: 12px;
            align-items: center;
            flex: 1;
        }

        .slider-label {
            font-size: 11px;
            color: #666;
            min-width: 45px;
            text-align: center;
        }

        input[type="range"] {
            flex: 1;
            height: 6px;
            border-radius: 3px;
            background: var(--border-color);
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--primary-color);
            cursor: pointer;
        }

        input[type="range"]::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--primary-color);
            cursor: pointer;
            border: none;
        }

        .results-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .stock-card {
            background: white;
            border-radius: 8px;
            padding: 16px;
            border: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            min-height: 48px;
        }

        .stock-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .stock-symbol {
            font-weight: 600;
            color: var(--text-color);
            font-size: 14px;
        }

        .stock-price {
            font-size: 12px;
            color: #999;
        }

        .stock-probability {
            font-size: 16px;
            font-weight: 700;
            color: var(--success-color);
            min-width: 60px;
            text-align: right;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: #999;
            font-size: 14px;
        }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid #f0f0f0;
            border-top-color: var(--primary-color);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: #999;
            font-size: 14px;
            padding: 40px 20px;
            text-align: center;
        }

        .error-banner {
            background: var(--danger-color);
            color: white;
            padding: 12px 16px;
            font-size: 13px;
            margin: 16px;
            border-radius: 6px;
            display: none;
        }

        .error-banner.show {
            display: block;
        }

        @media (max-width: 600px) {
            .controls {
                padding: 12px;
            }

            .control-row {
                gap: 8px;
            }

            button {
                font-size: 12px;
                padding: 8px 10px;
            }

            .stock-card {
                padding: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-icon"></div>
        <div class="header-title">Stock Scanner</div>
    </div>

    <div class="content">
        <div class="controls">
            <div class="control-row">
                <span class="control-label">期間</span>
                <div class="button-group">
                    <button class="period-btn active" data-period="1w">1週</button>
                    <button class="period-btn" data-period="1m">1ヶ月</button>
                    <button class="period-btn" data-period="6m">6ヶ月</button>
                </div>
            </div>

            <div class="control-row">
                <span class="control-label">市場</span>
                <div class="button-group">
                    <button class="market-btn active" data-market="jpx">JPX</button>
                    <button class="market-btn" data-market="nyse">NYSE</button>
                </div>
            </div>

            <div class="control-row">
                <span class="control-label">RCスコア</span>
                <div class="slider-container">
                    <input type="range" id="rcSlider" min="0" max="100" value="50" class="slider">
                    <span class="slider-label" id="rcValue">0.50</span>
                </div>
            </div>

            <div class="control-row">
                <span class="control-label">トレンド</span>
                <div class="slider-container">
                    <input type="range" id="trendSlider" min="0" max="100" value="50" class="slider">
                    <span class="slider-label" id="trendValue">0.50</span>
                </div>
            </div>

            <div class="control-row">
                <button id="predictBtn" style="flex: 1; min-height: 44px; background: var(--primary-color); color: white; font-weight: 700; font-size: 14px;">
                    予測を実行
                </button>
            </div>
        </div>

        <div class="error-banner" id="errorBanner"></div>

        <div class="results-container" id="resultsContainer">
            <div class="empty-state">
                <div>📈 予測結果がここに表示されます</div>
                <div style="font-size: 12px;">期間と市場を選択して「予測を実行」をクリック</div>
            </div>
        </div>
    </div>

    <script>
        // ========== Configuration ==========
        // GitHub Pages にデプロイ時は以下の API_BASE_URL を変更してください
        // Render 等でバックエンドをホストしている URL に変更します
        const API_BASE_URL = 'https://your-api.render.com';
        // 例: 'https://stock-scanner-api.render.com'
        // ================================

        // State
        let state = {
            period: '1w',
            market: 'jpx',
            rcScore: 0.5,
            trendWeight: 0.5,
            isLoading: false
        };

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            setupEventListeners();
            registerServiceWorker();
            setupSliders();
        });

        function setupEventListeners() {
            // Period buttons
            document.querySelectorAll('.period-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    state.period = e.target.dataset.period;
                });
            });

            // Market buttons
            document.querySelectorAll('.market-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.market-btn').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    state.market = e.target.dataset.market;
                });
            });

            // Predict button
            document.getElementById('predictBtn').addEventListener('click', predict);
        }

        function setupSliders() {
            const rcSlider = document.getElementById('rcSlider');
            const trendSlider = document.getElementById('trendSlider');

            rcSlider.addEventListener('input', (e) => {
                state.rcScore = e.target.value / 100;
                document.getElementById('rcValue').textContent = state.rcScore.toFixed(2);
            });

            trendSlider.addEventListener('input', (e) => {
                state.trendWeight = e.target.value / 100;
                document.getElementById('trendValue').textContent = state.trendWeight.toFixed(2);
            });
        }

        async function predict() {
            if (state.isLoading) return;
            if (!API_BASE_URL || API_BASE_URL.includes('your-api')) {
                showError('⚠️ API_BASE_URL が設定されていません。index.html の API_BASE_URL を編集してください');
                return;
            }

            state.isLoading = true;
            showLoading();
            hideError();

            try {
                const response = await fetch(`${API_BASE_URL}/api/predict`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        period: state.period,
                        market: state.market,
                        rc_score: state.rcScore,
                        trend_weight: state.trendWeight
                    })
                });

                if (!response.ok) {
                    throw new Error(`API Error: ${response.status}`);
                }

                const data = await response.json();
                displayResults(data.results || []);
            } catch (err) {
                showError(`❌ 予測に失敗しました: ${err.message}`);
                console.error(err);
            } finally {
                state.isLoading = false;
            }
        }

        function displayResults(results) {
            const container = document.getElementById('resultsContainer');
            
            if (!results || results.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div>📊 結果がありません</div>
                    </div>
                `;
                return;
            }

            container.innerHTML = results.map(stock => `
                <div class="stock-card">
                    <div class="stock-info">
                        <div class="stock-symbol">${stock.symbol}</div>
                        <div class="stock-price">¥${stock.current_price?.toFixed(2) || 'N/A'}</div>
                    </div>
                    <div class="stock-probability">${(stock.probability * 100).toFixed(1)}%</div>
                </div>
            `).join('');
        }

        function showLoading() {
            const container = document.getElementById('resultsContainer');
            container.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <span>予測中...</span>
                </div>
            `;
        }

        function showError(message) {
            const banner = document.getElementById('errorBanner');
            banner.textContent = message;
            banner.classList.add('show');
        }

        function hideError() {
            const banner = document.getElementById('errorBanner');
            banner.classList.remove('show');
        }

        // Service Worker registration
        async function registerServiceWorker() {
            if ('serviceWorker' in navigator) {
                try {
                    await navigator.serviceWorker.register('/service-worker.js');
                } catch (err) {
                    console.log('Service Worker registration failed:', err);
                }
            }
        }
    </script>
</body>
</html>
