<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Scanner Icon Generator</title>
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .container {
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 40px;
            font-size: 14px;
        }

        .preview-section {
            text-align: center;
            margin-bottom: 40px;
        }

        .preview-label {
            font-size: 12px;
            text-transform: uppercase;
            color: #999;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        canvas {
            border: 2px solid #f0f0f0;
            border-radius: 8px;
            max-width: 100%;
            display: block;
            margin: 0 auto;
        }

        .button-group {
            display: flex;
            gap: 16px;
            margin-top: 40px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 12px 24px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-download {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-width: 150px;
        }

        .btn-download:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-copy {
            background: #f0f0f0;
            color: #333;
            min-width: 150px;
        }

        .btn-copy:hover {
            background: #e0e0e0;
        }

        .info-box {
            background: #f9f9f9;
            border-left: 4px solid #667eea;
            padding: 20px;
            margin-top: 40px;
            border-radius: 4px;
            font-size: 13px;
            line-height: 1.6;
        }

        .info-box strong {
            display: block;
            margin-bottom: 8px;
            color: #333;
        }

        .info-box code {
            background: white;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
        }

        .status {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
        }

        .status.success {
            color: #4caf50;
        }

        .status.error {
            color: #f44336;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📱 Stock Scanner Icon Generator</h1>
        <p class="subtitle">iPhone PWA 用アイコンの生成ツール</p>

        <div class="preview-section">
            <div class="preview-label">プレビュー (512×512 px)</div>
            <canvas id="iconCanvas" width="512" height="512"></canvas>
        </div>

        <div class="button-group">
            <button class="btn-download" onclick="downloadIcon()">
                ⬇️ ダウンロード (PNG)
            </button>
            <button class="btn-copy" onclick="copyToClipboard()">
                📋 コピー
            </button>
        </div>

        <div id="status" class="status"></div>

        <div class="info-box">
            <strong>✨ 使い方</strong>
            1. 下のボタンでアイコンをダウンロード<br>
            2. <code>stock-scanner-frontend/public/icon.png</code> に保存<br>
            3. ホーム画面から「Stocks」アプリをインストール
        </div>
    </div>

    <script>
        function generateIcon() {
            const canvas = document.getElementById('iconCanvas');
            const ctx = canvas.getContext('2d');
            const size = 512;

            // 背景をクリア
            ctx.clearRect(0, 0, size, size);

            // グラデーション背景（紺から紫）
            const gradient = ctx.createLinearGradient(0, 0, 0, size);
            gradient.addColorStop(0, '#4169A0');    // 紺
            gradient.addColorStop(1, '#7A4BA2');    // 紫
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, size, size);

            // パディング
            const padding = size * 0.1;
            const chartX = padding;
            const chartY = padding;
            const chartW = size - padding * 2;
            const chartH = size - padding * 2;

            // 白い背景（角丸）
            ctx.fillStyle = 'rgba(255, 255, 255, 0.98)';
            ctx.beginPath();
            const radius = size * 0.08;
            ctx.roundRect(chartX, chartY, chartW, chartH, radius);
            ctx.fill();

            // グラフエリア
            const graphPadding = size * 0.08;
            const graphX = chartX + graphPadding;
            const graphY = chartY + graphPadding;
            const graphW = chartW - graphPadding * 2;
            const graphH = chartH - graphPadding * 2;

            // グリッドラインを描画
            ctx.strokeStyle = 'rgba(220, 220, 220, 0.5)';
            ctx.lineWidth = 1;
            for (let i = 0; i <= 4; i++) {
                const y = graphY + (graphH * i / 4);
                ctx.beginPath();
                ctx.moveTo(graphX, y);
                ctx.lineTo(graphX + graphW, y);
                ctx.stroke();

                const x = graphX + (graphW * i / 4);
                ctx.beginPath();
                ctx.moveTo(x, graphY);
                ctx.lineTo(x, graphY + graphH);
                ctx.stroke();
            }

            // 上昇チャート（データポイント）
            const points = [];
            const numPoints = 8;

            for (let i = 0; i < numPoints; i++) {
                const x = graphX + (graphW * i / (numPoints - 1));
                const baseRatio = i / (numPoints - 1);
                const wave = Math.sin(baseRatio * Math.PI) * 0.2;
                const yRatio = 0.7 - (baseRatio * 0.5) + wave;
                const y = graphY + graphH * (1 - yRatio);
                points.push({ x, y });
            }

            // 面積をグラデーションで塗りつぶし
            const areaGradient = ctx.createLinearGradient(0, graphY, 0, graphY + graphH);
            areaGradient.addColorStop(0, 'rgba(76, 175, 80, 0.3)');
            areaGradient.addColorStop(1, 'rgba(76, 175, 80, 0.05)');
            
            ctx.fillStyle = areaGradient;
            ctx.beginPath();
            ctx.moveTo(graphX, graphY + graphH);
            for (let point of points) {
                ctx.lineTo(point.x, point.y);
            }
            ctx.lineTo(graphX + graphW, graphY + graphH);
            ctx.closePath();
            ctx.fill();

            // 線グラフ（緑系）
            ctx.strokeStyle = '#2E8B57';
            ctx.lineWidth = 4;
            ctx.lineJoin = 'round';
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(points[0].x, points[0].y);
            for (let i = 1; i < points.length; i++) {
                ctx.lineTo(points[i].x, points[i].y);
            }
            ctx.stroke();

            // ポイント（円）を描画
            ctx.fillStyle = '#228B22';
            const pointRadius = size * 0.02;
            for (let point of points) {
                ctx.beginPath();
                ctx.arc(point.x, point.y, pointRadius, 0, Math.PI * 2);
                ctx.fill();
            }

            // 上昇矢印
            const arrowSize = size * 0.06;
            const arrowX = graphX + graphW - arrowSize * 1.5;
            const arrowY = graphY - arrowSize * 1.5;

            ctx.fillStyle = '#4CAF50';
            ctx.beginPath();
            ctx.moveTo(arrowX, arrowY + arrowSize);
            ctx.lineTo(arrowX + arrowSize, arrowY + arrowSize);
            ctx.lineTo(arrowX + arrowSize / 2, arrowY);
            ctx.closePath();
            ctx.fill();
        }

        function downloadIcon() {
            const canvas = document.getElementById('iconCanvas');
            const link = document.createElement('a');
            link.href = canvas.toDataURL('image/png');
            link.download = 'icon.png';
            link.click();

            showStatus('✅ ダウンロードしました！ stock-scanner-frontend/public/ に保存してください', 'success');
        }

        function copyToClipboard() {
            const canvas = document.getElementById('iconCanvas');
            canvas.toBlob(blob => {
                navigator.clipboard.write([
                    new ClipboardItem({ 'image/png': blob })
                ]).then(() => {
                    showStatus('📋 クリップボードにコピーしました！', 'success');
                }).catch(() => {
                    showStatus('❌ コピーに失敗しました', 'error');
                });
            });
        }

        function showStatus(message, type) {
            const statusEl = document.getElementById('status');
            statusEl.textContent = message;
            statusEl.className = `status ${type}`;
            setTimeout(() => {
                statusEl.className = 'status';
            }, 3000);
        }

        // 初期化
        window.addEventListener('load', () => {
            generateIcon();
        });
    </script>
</body>
</html>
