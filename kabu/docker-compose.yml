# docker-compose.yml

version: '3.8'

services:
  backend:
    build:
      context: ./stock-scanner-backend
      dockerfile: Dockerfile
    container_name: stock-scanner-backend
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - LOG_LEVEL=info
    volumes:
      - ./stock-scanner-backend:/app
    restart: unless-stopped

  frontend:
    build:
      context: ./stock-scanner-frontend
      dockerfile: Dockerfile.dev
    container_name: stock-scanner-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./stock-scanner-frontend:/app
      - /app/node_modules
    restart: unless-stopped

networks:
  default:
    driver: bridge
